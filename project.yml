name: XrayBar
options:
  bundleIdPrefix: com.osbertngok
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  XrayBar:
    type: application
    platform: macOS
    sources:
      - XrayBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osbertngok.XrayBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_LSUIElement: true
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: XrayBarHelper

  XrayBarHelper:
    type: tool
    platform: macOS
    sources:
      - XrayBarHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osbertngok.XrayBarHelper
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        GENERATE_INFOPLIST_FILE: true
